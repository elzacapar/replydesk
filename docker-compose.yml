version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: scrm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - scrm-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrm-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - scrm-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scrm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    depends_on:
      - backend
    networks:
      - scrm-net

volumes:
  mongo_data:
    driver: local

networks:
  scrm-net:
    driver: bridge
